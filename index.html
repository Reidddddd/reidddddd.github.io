<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梅花易数</title>
<link rel="stylesheet" href="app.css">
</head>
<body>
<div class="bg-temple">
  <div class="tai-ji"></div>
  <span class="gua gua-n">☰︎</span>
  <span class="gua gua-nw">☱︎</span>
  <span class="gua gua-w">☲︎</span>
  <span class="gua gua-sw">☳︎</span>
  <span class="gua gua-s">☷︎</span>
  <span class="gua gua-se">☶︎</span>
  <span class="gua gua-e">☵︎</span>
  <span class="gua gua-ne">☴︎</span>
</div>
<div class="container">
  <header class="header">
    <div class="header-title">
      <h1>梅花易数</h1>
      <p>谋事在人，成事在天</p>
    </div>
    <div class="header-action">
      <a class="support-link" href="https://github.com/Reidddddd/reidddddd.github.io/tree/pisces" target="_blank" rel="noopener noreferrer" aria-label="打开支持本站页面">结缘，随喜</a>
    </div>
  </header>

  <div class="main-row">
    <div class="left-col">
      <section class="card card-padded input-section">
        <div class="input-group">
          <label for="question">所问何事</label>
          <input type="text" id="question" placeholder="输入你所问的事情……" maxlength="200">
        </div>
        <div class="input-group">
          <label for="waiying">外应（选填）</label>
          <input type="text" id="waiying" placeholder="起卦时周围的特殊现象，无则留空……">
        </div>
      </section>

      <section class="card card-padded grid-section">
        <div class="cast-section">
          <div class="cast-title-row">
            <h2>起卦</h2>
            <div class="cast-switch" role="group" aria-label="起卦方式">
              <button type="button" class="cast-switch-btn active" data-cast-mode="numbers">自选数</button>
              <button type="button" class="cast-switch-btn" data-cast-mode="random">天选数</button>
              <button type="button" class="cast-switch-btn" data-cast-mode="lunar">农历时</button>
              <button type="button" class="cast-switch-btn" data-cast-mode="custom">自定义</button>
            </div>
          </div>
          <div class="cast-summary">
            <label id="castSummaryLabel">
              <span id="castSummaryLine1">大衍之数五十，其用四十有九</span>
              <span id="castSummaryLine2">随心取数二三，以观其象所成</span>
            </label>
            <div class="selected-nums" id="selectedNums"></div>
          </div>
          <div class="btn-row">
            <button class="btn btn-primary" id="btnQiGua" disabled>起卦</button>
            <button class="btn btn-primary" id="btnJieGua" style="display:none" disabled>解卦</button>
            <button class="btn btn-secondary" id="btnReset">重选</button>
          </div>
        </div>

        <div class="mode-panel" id="numberCastPanel">
          <div class="number-grid" id="numberGrid"></div>
        </div>

        <div class="mode-panel" id="randomCastPanel" hidden>
          <div class="random-number-grid" id="randomNumberGrid" aria-live="polite"></div>
          <span id="randomNumber" hidden></span>
        </div>

        <div class="mode-panel lunar-cast-panel" id="lunarCastPanel" hidden>
          <div class="lunar-calendar-card">
            <div class="lunar-calendar-hrow">
              <div class="lunar-calendar-header">
                <button type="button" class="cal-nav" id="calPrev" aria-label="上一月">‹</button>
                <span class="cal-month-label"><button type="button" class="cal-year-btn" id="calYearBtn"></button>年<span id="calMonthText"></span>月<div class="cal-year-drop" id="calYearDrop" hidden></div></span>
                <button type="button" class="cal-nav" id="calNext" aria-label="下一月">›</button>
              </div>
              <span class="time-side-label">时分</span>
            </div>
            <div class="lunar-calendar-body">
              <div class="lunar-calendar-main">
                <div class="lunar-calendar-weekdays">
                  <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
                </div>
                <div class="lunar-calendar-days" id="calDays"></div>
              </div>
              <div class="lunar-calendar-time-side">
              <div class="time-scroll-wrap">
                <div class="time-scroll-highlight"></div>
                <div class="time-scroll" id="hourScroll"></div>
              </div>
              <div class="time-scroll-wrap">
                <div class="time-scroll-highlight"></div>
                <div class="time-scroll" id="minuteScroll"></div>
              </div>
              </div>
            </div>
          </div>
          <div class="lunar-cast-result" id="lunarCastResult" hidden>
            <div class="lunar-cast-source">
              <span>农历时</span>
              <strong id="lunarCastSource"></strong>
            </div>
            <div class="lunar-cast-grid">
              <div class="lunar-cast-item">
                <span>上卦</span>
                <strong id="lunarShang"></strong>
                <em id="lunarShangFormula"></em>
              </div>
              <div class="lunar-cast-item">
                <span>下卦</span>
                <strong id="lunarXia"></strong>
                <em id="lunarXiaFormula"></em>
              </div>
              <div class="lunar-cast-item">
                <span>动爻</span>
                <strong id="lunarDong"></strong>
                <em id="lunarDongFormula"></em>
              </div>
            </div>
          </div>
          <div class="lunar-cast-error" id="lunarCastError"></div>
        </div>

        <div class="mode-panel custom-cast-panel" id="customCastPanel" hidden>
          <div class="custom-cast-group">
            <div class="custom-cast-title">上卦</div>
            <div class="custom-gua-grid" id="customShangOptions"></div>
          </div>
          <div class="custom-cast-group">
            <div class="custom-cast-title">下卦</div>
            <div class="custom-gua-grid" id="customXiaOptions"></div>
          </div>
          <div class="custom-cast-group">
            <div class="custom-cast-title">动爻</div>
            <div class="custom-yao-grid" id="customDongOptions"></div>
          </div>
        </div>
      </section>

      <section class="card card-padded lunar-panel" id="lunarPanel">
        <div class="lunar-col"><div class="lunar-top">--</div><div class="lunar-bottom">--</div></div>
        <div class="lunar-col"><div class="lunar-top">--</div><div class="lunar-bottom">--</div></div>
        <div class="lunar-col"><div class="lunar-top">--</div><div class="lunar-bottom">--</div></div>
        <div class="lunar-col"><div class="lunar-top">--</div><div class="lunar-bottom">--</div></div>
        <div class="lunar-col"><div class="lunar-top">--</div><div class="lunar-bottom">--</div></div>
        <div class="lunar-col"><div class="lunar-top">--</div><div class="lunar-bottom">--</div></div>
      </section>
      <div class="footer-text">卦无痕，君自存</div>
    </div>

    <div class="right-col">
      <section class="card card-padded hex-section">
        <h2>卦象</h2>
        <div class="placeholder" id="hexPlaceholder">取数起卦后，卦象显示于此</div>
        <div class="hex-cols" id="hexCols" style="display:none"></div>
      </section>

      <section class="card card-padded result-section">
        <div class="result-head">
          <h2>解卦</h2>
          <div class="result-tools" id="resultTools" style="display:none">
            <button type="button" class="result-tab active" data-result-view="guwen">古文</button>
            <button type="button" class="result-tab" data-result-view="baihua">白话</button>
            <button type="button" class="result-tab" data-result-view="yili">易理</button>
            <button type="button" class="result-save" id="btnSaveResult" disabled>保存</button>
          </div>
        </div>
        <div class="result-status" id="resultStatus" style="display:none">
          <div class="spinner-sm active"></div>
          <span class="status-text" id="statusText"></span>
          <span class="status-detail" id="statusDetail"></span>
        </div>
        <div class="placeholder" id="resultPlaceholder">取数起卦后，解卦结果显示于此</div>
        <div class="result-content" id="resultContent" style="display:none"></div>
      </section>
      <div class="footer-text" style="text-align:right">承先贤之智，谢深度求索</div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
